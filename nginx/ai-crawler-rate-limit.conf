# ai-crawler-rate-limit.conf - Rate limiting for AI crawlers
# Include this in your http {} block (before server blocks)

# Map AI crawlers to a separate rate limit zone
map $http_user_agent $ai_crawler_key {
    default             "";
    ~*GPTBot            "gptbot";
    ~*ChatGPT-User      "chatgpt";
    ~*PerplexityBot     "perplexity";
    ~*ClaudeBot         "claude";
    ~*Google-Extended   "google-ai";
    ~*Applebot-Extended "apple-ai";
    ~*cohere-ai         "cohere";
    ~*Bytespider        "bytedance";
}

# Rate limit zones
# AI crawlers: 5 requests/second per bot type (generous but bounded)
limit_req_zone $ai_crawler_key zone=ai_crawlers:10m rate=5r/s;

# Regular visitors: 20 requests/second per IP
limit_req_zone $binary_remote_addr zone=regular:10m rate=20r/s;

# Aggressive/unknown bots: 1 request/second per IP
map $http_user_agent $is_aggressive_bot {
    default                 0;
    ~*CCBot                 1;
    ~*Amazonbot             1;
    ~*Bytespider            1;
}
limit_req_zone $binary_remote_addr zone=aggressive_bots:5m rate=1r/s;

# Apply in server {} block:
# location / {
#     # Allow burst for AI crawlers (they crawl in batches)
#     limit_req zone=ai_crawlers burst=20 nodelay;
#
#     # Standard rate limit for regular traffic
#     limit_req zone=regular burst=40 nodelay;
#
#     # Return 429 (not 503) so bots know to retry later
#     limit_req_status 429;
# }

# Optional: block bots you don't want at all
# if ($http_user_agent ~* "BadBot|SemrushBot|AhrefsBot") {
#     return 403;
# }

# Log format including bot classification
log_format ai_access '$remote_addr - $ai_crawler_key [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_user_agent"';

# Separate log for AI crawler traffic analysis
# access_log /var/log/nginx/ai-crawlers.log ai_access if=$ai_crawler_key;
