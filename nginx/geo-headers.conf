# geo-headers.conf - HTTP headers for AI crawler compatibility
# Include this in your server {} block

# Signal content freshness to AI crawlers
add_header X-Content-Type-Options "nosniff" always;
add_header X-Robots-Tag "index, follow, max-snippet:-1, max-image-preview:large" always;
add_header Last-Modified $date_gmt;

# Allow AI crawlers to read structured data
add_header Access-Control-Allow-Origin "*" always;
add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
add_header Access-Control-Allow-Headers "Content-Type" always;

# Cache control: let AI crawlers know content is fresh but cacheable
map $http_user_agent $geo_cache_control {
    default                "public, max-age=3600, stale-while-revalidate=86400";
    ~*GPTBot               "public, max-age=1800";
    ~*PerplexityBot        "public, max-age=1800";
    ~*ClaudeBot            "public, max-age=1800";
    ~*Google-Extended      "public, max-age=1800";
}

# Apply cache headers
add_header Cache-Control $geo_cache_control;

# Enable gzip for text content AI crawlers parse
gzip on;
gzip_types text/plain text/html text/css application/json application/javascript
           text/xml application/xml application/xml+rss text/javascript
           application/ld+json;
gzip_min_length 256;
gzip_vary on;

# Ensure proper charset for AI content parsing
charset utf-8;
charset_types text/plain text/html text/css application/json application/javascript
              text/xml application/xml application/ld+json;

# Log AI crawler access separately for monitoring
map $http_user_agent $is_ai_crawler {
    default         0;
    ~*GPTBot        1;
    ~*PerplexityBot 1;
    ~*ClaudeBot     1;
    ~*Google-Extended 1;
    ~*Applebot-Extended 1;
    ~*cohere-ai     1;
}

# Security headers that don't block AI crawlers
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "interest-cohort=()" always;
