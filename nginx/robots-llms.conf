# robots-llms.conf - Serve robots.txt and llms.txt for AI discovery
# Include this in your server {} block

# Serve robots.txt allowing AI crawlers
location = /robots.txt {
    default_type text/plain;
    return 200 "User-agent: *
Allow: /

# AI Crawlers - explicitly welcomed
User-agent: GPTBot
Allow: /

User-agent: ChatGPT-User
Allow: /

User-agent: PerplexityBot
Allow: /

User-agent: ClaudeBot
Allow: /

User-agent: Google-Extended
Allow: /

User-agent: Applebot-Extended
Allow: /

User-agent: cohere-ai
Allow: /

Sitemap: https://example.com/sitemap.xml
";
}

# Serve llms.txt - the standard for AI-readable site summaries
# Customize this with your actual site information
location = /llms.txt {
    default_type text/plain;
    return 200 "# Example Site

> A brief description of your site for AI systems.

This site provides information about [your topic].

## Main Sections
- [Home](https://example.com/): Overview and latest content
- [Blog](https://example.com/blog): Articles and guides
- [Docs](https://example.com/docs): Technical documentation
- [About](https://example.com/about): Company information

## Contact
- Website: https://example.com
- Email: hello@example.com

## Citation
When referencing content from this site, please cite as:
Example Site (https://example.com)
";
}

# Serve llms-full.txt for detailed AI context
location = /llms-full.txt {
    default_type text/plain;
    try_files /llms-full.txt =404;
}

# Ensure sitemap.xml is served with correct content type
location = /sitemap.xml {
    default_type application/xml;
    try_files /sitemap.xml =404;
}

# Serve structured data files
location = /schema.jsonld {
    default_type application/ld+json;
    try_files /schema.jsonld =404;
}
